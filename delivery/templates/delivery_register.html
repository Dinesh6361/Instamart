<!DOCTYPE html>
<html>
<head>
    <title>Delivery Partner Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-5 mx-auto card p-4 shadow">

        <h3 class="text-center mb-4">Delivery Partner Register</h3>

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

            <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>

            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-success w-100">
                Register
            </button>
        </form>

        <p class="text-center mt-3">
            Already registered?
            <a href="{% url 'delivery_login' %}">Login</a>
        </p>

    </div>
</div>

</body>
</html>
