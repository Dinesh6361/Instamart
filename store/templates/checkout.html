<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Checkout</h2>

    {% if discount %}
        <h4 class="text-success">
            Total Amount: ₹{{ final_total }}
        </h4>

        <p class="text-decoration-line-through text-danger">
            Original Price: ₹{{ total }}
        </p>

        <p class="text-success">
            Coupon Applied - ₹{{ discount }} OFF
        </p>
    {% else %}
        <h4>
            Total Amount: ₹{{ total }}
        </h4>
    {% endif %}

    <form method="GET" class="mb-3">
        <input type="text"
               name="coupon"
               value="{{ coupon_code }}"
               class="form-control mb-2"
               placeholder="Enter Coupon Code">

        <button class="btn btn-warning">
            Apply Coupon
        </button>
    </form>

    <form method="POST" id="checkout-form">
        {% csrf_token %}

        <input type="hidden" name="coupon" value="{{ coupon_code }}">

        <textarea
            name="address"
            class="form-control mb-3"
            placeholder="Enter Delivery Address"
            required></textarea>

        <input
            type="text"
            name="phone"
            class="form-control mb-3"
            placeholder="Phone Number"
            required>

        <select
            name="payment_method"
            id="payment_method"
            class="form-control mb-3"
            required>

            <option value="">Select Payment Method</option>
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="UPI">UPI / Razorpay</option>

        </select>

        <div id="cod-button-div">
            <button type="submit" class="btn btn-success">
                Place Order
            </button>
        </div>

        <div id="upi-button-div" style="display:none;">
            <button id="rzp-button" type="button" class="btn btn-primary">
                Pay & Place Order
            </button>
        </div>

    </form>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const paymentSelect = document.getElementById("payment_method");
const codDiv = document.getElementById("cod-button-div");
const upiDiv = document.getElementById("upi-button-div");

paymentSelect.addEventListener("change", function () {
    if (this.value === "UPI") {
        codDiv.style.display = "none";
        upiDiv.style.display = "block";
    } else {
        codDiv.style.display = "block";
        upiDiv.style.display = "none";
    }
});

var options = {
    key: "{{ razorpay_key }}",
    amount: "{{ final_total }}00",
    currency: "INR",
    name: "Swiggy Instamart",
    description: "Grocery Order Payment",
    order_id: "{{ razorpay_order_id }}",

    handler: function (response) {
        alert("Payment Successful!");
        document.getElementById("checkout-form").submit();
    },

    theme: {
        color: "#198754"
    }
};

document.getElementById("rzp-button").onclick = function(e) {
    var rzp = new Razorpay(options);
    rzp.open();
    e.preventDefault();
};
</script>

</body>
</html>
